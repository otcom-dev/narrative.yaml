---
title: Template Narrative

definitions:
  name: Definitions
  description: >
    Descriptions of terms used within this file and their meaning or desired interpretation.
  value:

    - name: "App"
      value: >
        A deployable software application/runtime (for example web app, desktop app, mobile app,
        or backend service host). An [[App]] is an architectural primitive and not equivalent
        to the full project scope, which may also include libraries, packages, or tooling.

    - name: "System"
      value: >
        A bounded software whole composed of one or more [[App]], [[Service]], library,
        and/or infrastructure elements that collaborate to deliver a cohesive capability.
        A [[System]] may consist of 0 to many [[Subsystem]] elements and may include both
        owned and external dependencies across multiple [[Boundary]] levels.

    - name: "Status"
      description: >
        The status of a feature or component.
      value:
        - name: 'idea'
          value: 'An idea for a feature or component'
        - name: 'in-progress'
          value: 'A feature or component that is being worked on'
        - name: 'partial'
          value: 'A feature or component that is partially complete'
        - name: 'review'
          value: 'A feature or component that is being reviewed by the user'
        - name: 'done'
          value: 'A feature or component that is complete'

    - name: "Framework"
      value: >
        A collection of software that is a dependency of software primitive, e.g. [[App]], [[Service]], [[Module]].

    - name: "Module"
      value: >
        A non-visual component of the application that serves as an organizational
        block of code and functionality.

    - name: "Subsystem"
      value: >
        A sufficiently large collection of logic and functionality that it needs to be
        separately managed. Generally a collection of [[Module]] elements.

    - name: "Layer"
      value: >
        An internal organizational boundary within a single [[App]] or [[Service]] used to group
        related [[Module]], [[Framework]], [[Component]], [[Transport]], [[State]], and [[DataModel]]
        elements. A [[Layer]] is not itself a process.

    - name: "Service"
      value: >
        A long-running process which might consist of multiple [[Subsystem]], [[Layer]], and/or [[Module]] elements.
        Services interact with external systems, APIs, or network resources. A [[Service]] is distinct
        from passive infrastructure layers and storage backends.  A function cannot be a service.

    - name: "Component"
      value: >
        A visual UI element that encapsulates display logic. Either from a component library
        or a custom chunk of frontend code.

    - name: "Page"
      value: >
        A screen shown to the user, composed of [[Component]] elements. An existing
        concept from the selected [[Framework]].  Dashboards are a type of page.

    - name: "DataModel"
      value: >
        The shape of data managed by the [[App]], manifested as a struct or interface.
        The singular unit transferring data between [[Module]], [[Component]], [[Page]], or [[Subsystem]].

    - name: "Storage"
      value: >
        The persistent capture of [[DataModel]], generally a database.

    - name: "State"
      value: >
        The in-memory representation of [[DataModel]], sometimes also persisted via [[Storage]].

    - name: "Feature"
      value: >
        A core operation, presentation, or behavior of the software primitive that is essential to the user's experience.

    - name: "Flourish"
      value: >
        A decorative or ergonomic enhancement layered on top of a [[Feature]]. Not required for core
        function — the underlying [[Feature]] is always accessible without it.

    - name: "Transport"
      value: >
        A communication channel used to move messages/events between systems or processes
        (for example websocket streams). Not a [[Service]] and not a [[Storage]] backend.

    - name: "ExternalSystem"
      value: >
        A third-party platform or dependency outside the ownership boundary of an [[App]]
        (for example identity providers, payment providers, or SaaS APIs). Interactions
        with an [[ExternalSystem]] should occur through explicit [[Contract]] definitions.

    - name: "Contract"
      value: >
        The explicit interface agreement between two boundaries (for example between
        [[Service]] and [[ExternalSystem]], or between [[Layer]] elements), including
        payload schema, required fields, and error semantics.

    - name: "Event"
      value: >
        An immutable record that a meaningful fact occurred within the system (for example
        user registered, payment settled, job completed). [[Event]] values are emitted
        across [[Transport]] channels and/or persisted in [[Storage]] for replay and audit.

    - name: "Workflow"
      value: >
        A multi-step orchestration that coordinates [[Module]], [[Service]], [[Event]], and
        [[Contract]] interactions to complete a user or system outcome.

    - name: "Cache"
      value: >
        A transient or bounded-lifetime data store used to reduce latency and repeated
        retrieval cost. A [[Cache]] is distinct from durable [[Storage]] and may be rebuilt
        from source-of-truth systems.

    - name: "Policy"
      value: >
        A centralized set of rules or constraints that govern allowed behavior (for example
        access rules, rate limits, or validation gates) across [[Workflow]] and [[Service]]
        boundaries.

    - name: "Boundary"
      value: >
        A trust, process, network, or responsibility separation line within the architecture.
        [[Boundary]] definitions clarify ownership, data exposure, and credential handling
        expectations between [[Layer]], [[Service]], and [[ExternalSystem]] elements.

    - name: "Metric"
      value: >
        A numeric telemetry signal sampled over time (for example latency, throughput,
        error rate, or queue depth) used to evaluate health and performance.

    - name: "Log"
      value: >
        A timestamped diagnostic record describing execution context, decisions, and failures
        within [[App]] runtime behavior.

    - name: "Trace"
      value: >
        A correlated execution path across multiple operations and/or process boundaries that
        links related [[Event]], [[Log]], and [[Metric]] signals for end-to-end analysis.

    - name: "Keybinding"
      value: >
        A keyboard shortcut that triggers an action. 
        
general:
  name: General
  description: 'General information about the product'
  value:

    - name: 'Name'
      value: 'Your App Name'
      description: 'The product name used for branding and identification'

    - name: 'Description'
      value: 'A one-sentence description of what this product does and for whom.'
      description: 'Concise explanation of the product and its primary purpose'

    - name: 'Motivation'
      value: >
        Why does this product exist? What problem does it solve, and why is this
        the right approach? What would users do without it?
      description: 'The core reason this product exists'

    - name: 'Target Audience'
      value: 'Who are the primary users of this product?'
      description: 'Primary user segments the product is designed to serve'


technical:
  name: Technical
  description: 'Technology stack — interpreted as an allowlist and set of defaults for implementation.'
  value:

    - name: 'Primary Language'
      description: 'The main programming language'
      value: 'e.g. TypeScript'

    - name: 'Build Framework'
      description: 'The application framework'
      value: 'e.g. Next.js'

    - name: 'UI Framework'
      description: 'Library for building user interfaces'
      value: 'e.g. React'

    - name: 'Styling'
      description: 'CSS approach or framework'
      value: 'e.g. Tailwind CSS'

    - name: 'Backend Framework'
      description: 'Server-side platform or framework'
      value: 'e.g. Express, Firebase, Supabase'

    - name: 'Storage'
      description: 'Database or persistence layer'
      value: 'e.g. PostgreSQL, Firestore'

    - name: 'Testing'
      description: 'Test framework and approach — unit, integration, and e2e'
      value: 'e.g. Jest + React Testing Library + Playwright'


architectural:
  name: Architectural
  description: 'Top-down decomposition of the system into Services, Subsystems, and Modules.'
  value:

    - name: 'ServiceA'
      type: 'Service'
      description: >
        The top-level service responsible for [domain]. Composed of [[SubsystemA1]] and [[SubsystemA2]].
        Exposes [type of interface] to [[ServiceB]] and the [[FrontEnd]].
      status: 'idea'

      value:
        - name: 'SubsystemA1'
          type: 'Subsystem'
          description: >
            Handles [responsibility] within [[ServiceA]]. Composed of [[ModuleA1a]] and [[ModuleA1b]].
          status: 'idea'
          value:
            - name: 'ModuleA1a'
              type: 'Module'
              value: >
                Responsible for [specific function]. Given a valid [[DataModel]], must write exactly
                one record to [[Storage]] and return a success result. Given invalid input, must
                reject with a typed error without writing to [[Storage]].
              status: 'idea'

            - name: 'ModuleA1b'
              type: 'Module'
              value: >
                Responsible for [specific function]. Given a valid identifier, must read from [[Storage]]
                and return the corresponding [[DataModel]]. Given an unknown identifier, must return
                a not-found result rather than throwing.
              status: 'idea'

        - name: 'SubsystemA2'
          type: 'Subsystem'
          value: >
            Handles [responsibility] within [[ServiceA]].
          status: 'idea'

    - name: 'ServiceB'
      type: 'Service'
      value: >
        The top-level service responsible for [domain]. Depends on [[ServiceA]] for [reason].
      status: 'idea'


features:
  name: Features
  description: 'Top-down decomposition of capabilities into Features and Sub-features, each referencing the architectural components they touch.'
  value:

    - name: 'CapabilityA'
      description: >
        The top-level capability that allows users to [goal]. Delivered through [[ServiceA]] and displayed via [[FrontEnd]].
      status: 'idea'

      value:
        - name: 'Feature A1'
          description: >
            Allows the user to [specific action]. Uses [[ModuleA1a]] to [do something] and displays the result via [Component].
          status: 'idea'
          value:
            - name: 'Sub-feature A1a'
              value: >
                When [condition], the user should be able to [specific interaction].
                Given the action succeeds, the result must be visible immediately without a page reload.
                Given the action fails, an inline error message must appear and no data should be lost.
                Persisted via [[Storage]] through [[ModuleA1b]].
              status: 'idea'

            - name: 'Sub-feature A1b'
              value: >
                When [edge case condition], the UI must handle [[Feature A1]] gracefully —
                displaying a clear explanation rather than a blank state or crash.
              status: 'idea'

        - name: 'Feature A2'
          value: >
            Allows the user to [specific action]. A follow-on to [[Feature A1]].
          status: 'idea'

    - name: 'CapabilityB'
      value: >
        The top-level capability that allows users to [goal]. Depends on [[CapabilityA]] being in place.
      status: 'idea'


flourishes:
  name: Flourishes
  description: 'Ergonomic and aesthetic enhancements layered on top of completed Features. Each flourish is gated by the feature it enhances.'
  value:

    - name: 'Design Language'
      description: >
        The overall visual tone of the [[App]]. Governs color, spacing, typography, and motion defaults
        applied across all [[Component]] elements.

      value:
        - name: 'Color Palette'
          value: >
            Primary, secondary, and semantic colors (success, warning, error, info) used consistently
            across all [[Component]] elements.

        - name: 'Motion & Animation'
          value: >
            Transition timing and easing defaults. Entrance/exit animations for modals, drawers, and toasts.

    - name: 'Keyboard Navigation'
      value: >
        Keyboard shortcuts for common actions within [[CapabilityA]] and [[CapabilityB]].
        The underlying [[Feature]] must remain fully accessible via mouse/touch — shortcuts are additive only.
        Given a keyboard shortcut is triggered, the result must be identical to clicking the corresponding control.
        Given a user has not learned the shortcut, discoverability must be present via a visible tooltip or legend.
